<script>
document.addEventListener("DOMContentLoaded",function(){
  var fi=document.querySelector("link[rel=icon]");
  if(fi)fi.href=VF_FAVICON_SRC;
});
</script>
<script>
(function(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get("id");
  if(!id){window.location.replace("/news.html");return;}
  fetch("/data/articles.json")
    .then(function(r){return r.json();})
    .then(function(articles){
      var a=articles.find(function(x){return x.id===id;});
      if(!a){window.location.replace("/news.html");return;}
      document.getElementById("page-title").textContent=a.title+" - VersicherungsFuchs";
      document.getElementById("page-desc").setAttribute("content",a.excerpt);
      document.getElementById("article-title").textContent=a.title;
      document.getElementById("article-meta").innerHTML=
        '<span class="news-tag">'+a.tag+'</span>'
        +'<time class="news-date">'+a.date+'</time>';
      document.getElementById("article-body").innerHTML=a.body||("<p>"+a.excerpt+"</p>");
    })
    .catch(function(){window.location.replace("/news.html");});
})();
</script>
