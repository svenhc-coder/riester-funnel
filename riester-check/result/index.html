<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/css/main.css">

  <meta name="description" content="Ihre persönliche Riester-Einschätzung basierend auf Ihren Angaben.">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    #pay-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:16px}
    #pay-overlay.open{display:flex}
    #pay-modal{background:var(--card,#16181c);border:1px solid var(--border,rgba(255,255,255,0.1));border-radius:20px;width:100%;max-width:480px;padding:32px 28px;box-shadow:0 24px 80px rgba(0,0,0,0.5)}
    #pay-modal h3{font-size:19px;font-weight:700;margin:0 0 4px}
    .pay-sub{color:var(--txt3,#888);font-size:13px;margin:0 0 24px}
    .pay-price{font-size:32px;font-weight:800;color:var(--acc,#f97316);margin:0 0 20px;letter-spacing:-1px}
    #payment-element{margin-bottom:20px}
    #pay-error{color:#ef4444;font-size:13px;margin-bottom:12px;display:none}
    #pay-close{background:none;border:none;color:var(--txt3,#888);cursor:pointer;font-size:13px;margin-top:12px;width:100%;text-align:center}
    #pay-close:hover{color:var(--txt,#fff)}
    #upload-section{display:none;background:rgba(249,115,22,0.06);border:1.5px solid rgba(249,115,22,0.25);border-radius:16px;padding:28px;margin:24px 0}
    #upload-section h3{font-size:17px;font-weight:700;margin:0 0 6px}
    #upload-section p{color:var(--txt2,#b0b0b0);font-size:13px;margin:0 0 20px}
    .upload-zone{border:2px dashed rgba(249,115,22,0.4);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(249,115,22,0.04)}
    .upload-zone:hover{border-color:var(--acc,#f97316);background:rgba(249,115,22,0.08)}
    .upload-zone input[type=file]{display:none}
    .uz-text{font-size:14px;color:var(--txt2,#b0b0b0)}
    .uz-hint{font-size:11px;color:var(--txt3,#888);margin-top:4px}
    #upload-status{font-size:13px;margin-top:12px;min-height:20px}
    #upload-status.ok{color:#22c55e}
    #upload-status.err{color:#ef4444}
  
    .nav-logo img { height: 38px; width: auto; display: block; }
  
    /* App Download CTA */
    .app-download-cta {
      background: linear-gradient(135deg, rgba(249,115,22,0.08) 0%, rgba(99,102,241,0.06) 100%);
      border: 1px solid rgba(249,115,22,0.25); border-radius: 16px;
      padding: 36px 32px; margin-top: 32px; text-align: center;
    }
    .app-download-badge {
      display: inline-block; background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3); color: var(--orange);
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: 5px 14px; border-radius: 20px; margin-bottom: 16px;
    }
    .app-download-title {
      font-size: 1.3rem; font-weight: 800; margin-bottom: 10px; line-height: 1.3;
    }
    .app-download-sub {
      font-size: 0.9rem; color: var(--txt2); max-width: 480px; margin: 0 auto 28px; line-height: 1.6;
    }
    .app-store-btns {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px;
    }
    .store-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--txt1); color: var(--bg0);
      padding: 12px 22px; border-radius: 12px; text-decoration: none;
      transition: transform .15s, box-shadow .2s; font-family: var(--font);
    }
    .store-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .app-download-disclaimer { font-size: 0.75rem; color: var(--txt3); }

  
    .footer-logo { height: 48px !important; width: auto !important; max-width: 200px !important; display: block; }
  </style>
</head>
<body>
<div id="root">
  <nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo"><img src="/assets/img/logo.png" height="38" alt="VersicherungsFuchs"></a>
    <div class="nav-links">
      <a href="/riester-check/">Riester-Check</a>
      <a href="/news/">Wissen</a>
      <a href="#app-download" class="nav-cta" onclick="document.querySelector('.app-download-cta')?.scrollIntoView({behavior:'smooth'});return false;">App holen</a>
    </div>
  </div>
</nav>
  <main class="page-wrap">
    <div id="lead-gate" class="ergebnis-wrap">
      <div class="container"><div class="ergebnis-inner" id="lead-body"></div></div>
    </div>
    <div id="result-section" style="display:none">
      <div class="ergebnis-wrap">
        <div class="container"><div class="ergebnis-inner" id="result-body"></div></div>
      </div>
      <footer class="footer"><div class="container">
        <div class="footer-inner">
          <div class="footer-brand">
            <img src="/assets/img/logo.png" id="footer-logo" class="footer-logo" alt="VersicherungsFuchs">
            <p class="footer-tagline">Schlau ist, wer nur das Beste nimmt.</p>
            <p class="footer-copy">&#169; 2026 iSurance Group</p>
          </div>
          <div class="footer-links">
            <a href="/" class="footer-link">Übersicht</a>
            <a href="/riester-check/" class="footer-link">Riester-Check</a>
            <a href="/impressum.html" class="footer-link">Impressum</a>

        <p class="footer-disclaimer">Kein Finanz-, Rechts- oder Steuerberatungsangebot. Dieser Check dient ausschließlich der strukturierten Orientierung.</p>

</div>

<div id="pay-overlay">
  <div id="pay-modal">
    <div id="pay-modal-price" class="pay-price"></div>
    <h3 id="pay-modal-title"></h3>
    <p id="pay-modal-sub" class="pay-sub"></p>
    <div id="payment-element"></div>
    <div id="pay-error"></div>
    <button id="pay-btn" class="btn-primary" style="width:100%"><span id="pay-btn-label">Jetzt bezahlen</span></button>
    <button id="pay-close" type="button">Abbrechen</button>
  </div>
</div>

<script src="/assets/js/brand.js"></script>
<script src="/assets/js/state.js"></script>
<script src="/assets/js/scoring.js"></script>
<script src="/assets/js/animations.js"></script>
<script>
var API_URL   = 'https://api.versicherungs-fuchs.online';
var STRIPE_PK = 'pk_live_51TU1f4J0pSFWANEk4tmiVp8arNKegqCLPXiP0HoZ1Vcg5BR55YL3lF3gFtiVcV9zAezkcvOqlRPD5kT6AbVWJryE00Z1gvXQco';

var A_SVG   = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
var CHK_SVG = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
var SHIELD  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';

var vfLeadId       = sessionStorage.getItem('vf_lead_id')    || null;
var vfClientSecret = sessionStorage.getItem('vf_cs')         || null;
var vfPaymentId    = sessionStorage.getItem('vf_payment_id') || null;
var stripeInst = null, stripeEls = null;

(function(){
  var answers = vfGetAnswers();
  if(Object.keys(answers).length < 8){ window.location.replace('/riester-check/'); return; }
  var ampel = berechneAmpel(answers), score = berechneScore(answers), empf = getHandlungsempfehlung(answers,ampel), lead = vfGetLead();
  var aC = {
    green:{color:'var(--green)',label:'Kein unmittelbarer Handlungsbedarf',bg:'rgba(34,197,94,0.08)',border:'rgba(34,197,94,0.2)'},
    yellow:{color:'var(--yellow)',label:'Prüfung empfohlen',bg:'rgba(234,179,8,0.08)',border:'rgba(234,179,8,0.2)'},
    red:{color:'var(--red)',label:'Hinweise auf Optimierungsbedarf',bg:'rgba(239,68,68,0.08)',border:'rgba(239,68,68,0.2)'}
  };
  var cfg = aC[ampel] || aC.yellow;
  if(lead && lead.email){ showResult(lead); } else { showLeadGate(); }

  function showLeadGate(){
    document.getElementById('lead-body').innerHTML =
      '<div class="lead-preview-ampel" style="border-color:'+cfg.border+';background:'+cfg.bg+'"><div class="lead-preview-dot" style="background:'+cfg.color+'"></div><span>'+cfg.label+'</span></div>'
      +'<h2 class="funnel-question" style="margin-bottom:8px">Wo sollen wir das Ergebnis hinschicken?</h2>'
      +'<p class="funnel-hint" style="margin-bottom:28px">Ihr Ergebnis wird direkt angezeigt und per E-Mail zugeschickt. Abmeldung jederzeit möglich.</p>'
      +'<form id="lead-form" class="lead-form">'
      +'<div class="lead-field"><label class="lead-label">Ihr Name</label><input class="lead-input" type="text" id="inp-name" placeholder="Max Mustermann" required></div>'
      +'<div class="lead-field"><label class="lead-label">E-Mail-Adresse</label><input class="lead-input" type="email" id="inp-email" placeholder="ihre@email.de" required></div>'
      +'<label class="lead-consent"><input type="checkbox" id="inp-consent" required> <span>Ich bin einverstanden, dass meine Daten zur Bearbeitung meiner Anfrage und Zusendung des Ergebnisses gespeichert und genutzt werden. Eine Weitergabe an Dritte erfolgt nicht. <a href="/datenschutz.html" target="_blank" style="color:var(--muted);text-decoration:underline">Datenschutz</a></span></label>'
      +'<div id="lead-err" class="lead-error" style="display:none"></div>'
      +'<button type="submit" class="btn-primary btn-lg" id="btn-submit"><span>Ergebnis anzeigen</span>'+A_SVG+'</button>'
      +'</form>'
      +'<p class="lead-disclaimer">'+SHIELD+' Keine Rechts- oder Finanzberatung. Kein Verkauf. Nur strukturierte Orientierung.</p>';

    document.getElementById('lead-form').addEventListener('submit',function(e){
      e.preventDefault();
      var name=document.getElementById('inp-name').value.trim(), email=document.getElementById('inp-email').value.trim();
      var consent=document.getElementById('inp-consent').checked, errEl=document.getElementById('lead-err');
      if(!name||!email){errEl.textContent='Bitte Namen und E-Mail angeben.';errEl.style.display='block';return;}
      if(!consent){errEl.textContent='Bitte stimmen Sie der Datenverarbeitung zu.';errEl.style.display='block';return;}
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){errEl.textContent='Bitte eine gültige E-Mail-Adresse eingeben.';errEl.style.display='block';return;}
      errEl.style.display='none';
      var btn=document.getElementById('btn-submit');
      btn.disabled=true; btn.querySelector('span').textContent='Wird gesendet...';

      // KORREKTER ENDPOINT: /api/lead (singular) mit vollständigem Payload
      fetch(API_URL+'/api/lead',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name:name,email:email,answers:answers,ampel_status:ampel,tier:'ki',source:'riester-check'})
      })
      .then(function(r){return r.ok?r.json():Promise.reject(r.status);})
      .then(function(data){
        if(data.lead_id){
          vfLeadId=data.lead_id; vfClientSecret=data.client_secret||null;
          vfPaymentId=vfClientSecret?vfClientSecret.split('_secret_')[0]:null;
          sessionStorage.setItem('vf_lead_id',vfLeadId);
          sessionStorage.setItem('vf_cs',vfClientSecret||'');
          sessionStorage.setItem('vf_payment_id',vfPaymentId||'');
        }
      }).catch(function(){});

      vfSaveLead({name:name,email:email});
      setTimeout(function(){showResult({name:name,email:email});},700);
    });
  }

  function showResult(lead){
    document.getElementById('lead-gate').style.display='none';
    document.getElementById('result-section').style.display='block';
    var steps=(empf.naechste_schritte||[]).map(function(s){return '<li class="ergebnis-step">'+CHK_SVG+'<span>'+s+'</span></li>';}).join('');
    var scoreCircle='<div id="score-circle" class="score-ring-wrap"><svg class="score-ring-svg" width="120" height="120" viewBox="0 0 120 120"><circle class="score-ring-track" cx="60" cy="60" r="42" stroke-width="8"/><circle class="score-ring-fill" cx="60" cy="60" r="42" stroke-width="8" transform="rotate(-90 60 60)"/><text class="score-ring-label" x="60" y="58" text-anchor="middle" dominant-baseline="middle">0</text><text class="score-ring-sublabel" x="60" y="74" text-anchor="middle" dominant-baseline="middle">/ 100</text></svg></div>';
    var dcgCards=[
      {tier:'ki',price:'Kostenlos',name:'KI-Analyse Ihres Vertrags',featured:true,btn:'Kostenlos hochladen',fn:'scrollToUpload()',
       features:['Upload Standmitteilung, Police oder Foto','KI-Analyse Ihrer tatsächlichen Vertragsdaten','Depot-Option 2027 im Vergleich','Ergebnis-PDF per E-Mail &middot; Datei danach gelöscht']},
      {tier:'deep',price:'Kostenlos',name:'Hilfe durch Experten-Netzwerk',featured:false,btn:'Hilfe anfragen',fn:"window.location.href='mailto:info@isurance-group.de?subject=Riester-Check%20Umsetzungshilfe'",
       features:['Vermittlung an unabhängige Versicherungsexperten','Persönliche Beratung zur Umsetzung','Sie entscheiden frei &mdash; kein Verkauf','Kostenlos und unverbindlich']}
    ].map(function(c){
      return '<div class="dcg-card'+(c.featured?' dcg-card-featured':'')+'"><div class="dcg-card-price">'+c.price+'</div><div class="dcg-card-name">'+c.name+'</div><ul class="dcg-card-features">'
        +c.features.map(function(f){return '<li class="dcg-card-feature">'+CHK_SVG+'<span>'+f+'</span></li>';}).join('')
        +'</ul><button id="btn-'+c.tier+'" onclick="'+c.fn+'" class="'+(c.featured?'btn-primary':'btn-secondary')+'" style="width:100%;cursor:pointer"><span>'+c.btn+'</span>'+A_SVG+'</button></div>';
    }).join('');

    document.getElementById('result-body').innerHTML=
      (lead.name?'<p class="ergebnis-greeting">Ihre Einschätzung, '+lead.name+':</p>':'')
      +'<div class="ergebnis-ampel-card" style="background:'+cfg.bg+';border:1.5px solid '+cfg.border+';border-radius:14px;padding:24px 28px;display:flex;align-items:center;gap:28px;margin-bottom:24px;flex-wrap:wrap">'
      +scoreCircle
      +'<div class="ergebnis-ampel-content"><div class="ergebnis-ampel-label" style="color:'+cfg.color+';font-weight:700;font-size:17px;margin-bottom:8px">'+cfg.label+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px"><div class="ampel-dot-'+ampel+'" style="width:12px;height:12px;border-radius:50%;background:'+cfg.color+';flex-shrink:0"></div>'
      +'<span style="font-size:13px;color:var(--txt3)">Riester Quick-Check Ergebnis</span></div></div></div>'
      +'<div class="ergebnis-card"><div class="ergebnis-card-icon">'+(empf.icon||'🔍')+'</div><h2 class="ergebnis-card-title">'+empf.titel+'</h2><p class="ergebnis-card-text">'+empf.kurzinterpretation+'</p></div>'
      +'<div class="ergebnis-section"><h3 class="ergebnis-section-title">Was das bedeutet</h3><p class="ergebnis-section-text">'+empf.was_bedeutet_das+'</p></div>'
      +'<div class="ergebnis-section"><h3 class="ergebnis-section-title">Mögliche nächste Schritte</h3><ul class="ergebnis-steps">'+steps+'</ul></div>'
      +'<div class="ergebnis-disclaimer"><p>Diese Einschätzung basiert auf Ihren Angaben im Quick-Check. Sie ersetzt keine Beratung und ist kein Rechts- oder Steuerurteil.</p></div>'
      +'<div id="upload-section"><h3>&#10003; Zahlung erfolgreich – Dokument hochladen</h3>'
      +'<p>Laden Sie jetzt Ihre Standmitteilung, Police oder ein Foto hoch (PDF, JPG, PNG, HEIC · max. 15 MB). Die Datei wird nach der Analyse automatisch gelöscht.</p>'
      +'<div class="upload-zone" id="upload-zone" onclick="document.getElementById(\'file-input\').click()">'
      +'<div style="font-size:32px;margin-bottom:8px">📄</div><div class="uz-text">Datei hier ablegen oder klicken zum Auswählen</div>'
      +'<div class="uz-hint">PDF · JPG · PNG · HEIC · WebP · max. 15 MB</div>'
      +'<input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.heic,.heif,.webp" onchange="uploadFile(this)"></div>'
      +'<div id="upload-status"></div></div>'
      +'<div class="deep-check-gate"><div class="dcg-header"><div class="tb-label">Nächster Schritt</div>'
      +'<h2 class="dcg-title">Kostenlos vertiefen &mdash; und Hilfe bei der Umsetzung</h2>'
      +'<p class="dcg-sub">Mit Ihren Vertragsunterlagen analysieren wir konkret: Kosten, Förderhistorie, Struktur, Depot-Option 2027 &ndash; kostenlos. Für die Umsetzung vermitteln wir Sie an unser Netzwerk unabhängiger Versicherungsexperten.</p></div>'
      +'<div class="dcg-cards">'+dcgCards+'</div>'
      +'</div>'
      +'<div class="app-download-cta">'
      +'<div class="app-download-badge">&#128241; Die App</div>'
      +'<h3 class="app-download-title">Deep-Check kostenlos mit der iSurance App</h3>'
      +'<p class="app-download-sub">Laden Sie alle Vertragsdaten hoch, erhalten Sie Ihren persönlichen Deep-Check kostenlos – und behalten Sie alle Versicherungen dauerhaft im Blick.</p>'
      +'<div class="app-store-btns">'
      +'<a href="https://apps.apple.com/de/app/isurance/id1438875800" target="_blank" rel="noopener" class="store-btn">'
      +'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>'
      +'<div><div style="font-size:10px;opacity:.8">Laden im</div><div style="font-size:15px;font-weight:700">App Store</div></div>'
      +'</a>'
      +'<a href="https://play.google.com/store/apps/details?id=de.isurance.app" target="_blank" rel="noopener" class="store-btn">'
      +'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76a2 2 0 0 0 2.36-.19l.06-.05 11.44-6.57-2.52-2.5-11.34 9.31zM20.87 10.59 18.1 9l-2.83 2.83 2.8 2.8 2.8-1.61a1.63 1.63 0 0 0 0-2.43zM1.08.49A1.67 1.67 0 0 0 .5 1.74v20.5a1.67 1.67 0 0 0 .58 1.25l.07.06 11.5-11.5v-.27L1.15.43zM5.54.43l11.44 6.57-2.52 2.52L5.54.43z"/></svg>'
      +'<div><div style="font-size:10px;opacity:.8">Jetzt bei</div><div style="font-size:15px;font-weight:700">Google Play</div></div>'
      +'</a>'
      +'</div>'
      +'<p class="app-download-disclaimer">Kostenlos · iOS & Android · Keine Kreditkarte</p>'
      +'</div>';

    if(typeof animateScoreRing==='function'){setTimeout(function(){animateScoreRing(score);},200);}
    if(window.location.search.indexOf('payment=success')!==-1){setTimeout(_showUpload,400);}
  }

  window.openKiPayment=function(){ if(typeof _showUpload==='function'){_showUpload();} };
  window.openDeepPayment=function(){ window.location.href='mailto:info@isurance-group.de?subject=Riester-Check%20Umsetzungshilfe'; };

  function _createAndPay(tier){
    var lead=vfGetLead();
    if(!lead||!lead.email){alert('Bitte zuerst Ihr Ergebnis anzeigen lassen.');return;}
    var btn=document.getElementById('btn-'+tier);
    if(btn){btn.disabled=true;btn.querySelector('span').textContent='Lädt...';}
    fetch(API_URL+'/api/lead',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:lead.name||'',email:lead.email,answers:vfGetAnswers(),
        ampel_status:berechneAmpel(vfGetAnswers()),tier:tier,source:'result-upgrade'})
    })
    .then(function(r){return r.ok?r.json():Promise.reject('API-Fehler');})
    .then(function(data){
      if(btn){btn.disabled=false;btn.querySelector('span').textContent=tier==='ki'?'Jetzt buchen':'Termin buchen';}
      if(!data.client_secret)throw new Error('Kein Secret');
      if(tier==='ki'){
        vfLeadId=data.lead_id||vfLeadId; vfClientSecret=data.client_secret;
        vfPaymentId=vfClientSecret.split('_secret_')[0];
        sessionStorage.setItem('vf_lead_id',vfLeadId||'');
        sessionStorage.setItem('vf_cs',vfClientSecret);
        sessionStorage.setItem('vf_payment_id',vfPaymentId);
      }
      _openPayModal('Kostenlos',
        tier==='ki'?'KI-Analyse Ihres Vertrags':'Hilfe durch Experten-Netzwerk',
        'Kostenlos und unverbindlich',
        data.client_secret,tier);
    })
    .catch(function(){
      if(btn){btn.disabled=false;btn.querySelector('span').textContent=tier==='ki'?'Jetzt buchen':'Termin buchen';}
      alert('Fehler beim Laden der Zahlung. Bitte erneut versuchen.');
    });
  }

  function _openPayModal(priceLabel,title,sub,cs,tier){
    document.getElementById('pay-modal-price').textContent=priceLabel;
    document.getElementById('pay-modal-title').textContent=title;
    document.getElementById('pay-modal-sub').textContent=sub;
    document.getElementById('pay-error').style.display='none';
    document.getElementById('pay-overlay').classList.add('open');
    if(!stripeInst)stripeInst=Stripe(STRIPE_PK);
    stripeEls=stripeInst.elements({clientSecret:cs,appearance:{theme:'night',variables:{colorPrimary:'#f97316',colorBackground:'#16181c',colorText:'#f0f0f0',borderRadius:'10px'}}});
    var el=stripeEls.create('payment',{layout:'tabs'});
    document.getElementById('payment-element').innerHTML='';
    el.mount('#payment-element');
    var payBtn=document.getElementById('pay-btn');
    payBtn.onclick=function(){
      var lbl=document.getElementById('pay-btn-label'),errEl=document.getElementById('pay-error');
      payBtn.disabled=true;lbl.textContent='Zahlung wird verarbeitet...';errEl.style.display='none';
      stripeInst.confirmPayment({elements:stripeEls,
        confirmParams:{return_url:window.location.href.split('?')[0]+'?payment=success'},
        redirect:'if_required'
      }).then(function(result){
        payBtn.disabled=false;lbl.textContent='Jetzt bezahlen';
        if(result.error){errEl.textContent=result.error.message;errEl.style.display='block';}
        else if(result.paymentIntent&&result.paymentIntent.status==='succeeded'){
          vfPaymentId=result.paymentIntent.id;
          sessionStorage.setItem('vf_payment_id',vfPaymentId);
          _closePayModal();
          if(tier==='ki'){_showUpload();}
          else{alert('Zahlung erfolgreich! Wir melden uns innerhalb von 24h für Ihren Termin.');}
        }
      });
    };
  }

  document.getElementById('pay-close').addEventListener('click',_closePayModal);
  document.getElementById('pay-overlay').addEventListener('click',function(e){if(e.target===this)_closePayModal();});

  function _closePayModal(){
    document.getElementById('pay-overlay').classList.remove('open');
    if(stripeEls){try{var el=stripeEls.getElement('payment');if(el)el.destroy();}catch(e){}stripeEls=null;}
  }
  function _showUpload(){
    var sec=document.getElementById('upload-section');
    if(sec){sec.style.display='block';sec.scrollIntoView({behavior:'smooth',block:'center'});}
  }

  window.uploadFile=function(input){
    var file=input.files[0];if(!file)return;
    var statusEl=document.getElementById('upload-status'),zone=document.getElementById('upload-zone');
    var leadId=vfLeadId||sessionStorage.getItem('vf_lead_id');
    var paymentId=vfPaymentId||sessionStorage.getItem('vf_payment_id');
    if(!leadId||!paymentId){statusEl.className='err';statusEl.textContent='Fehler: Bitte zuerst den KI-Check buchen und bezahlen.';return;}
    statusEl.className='';statusEl.textContent='Datei wird hochgeladen und analysiert…';
    zone.style.opacity='0.5';zone.style.pointerEvents='none';
    var fd=new FormData();
    fd.append('file',file);fd.append('lead_id',leadId);fd.append('payment_id',paymentId);
    fd.append('answers_json',JSON.stringify(vfGetAnswers()));
    fetch(API_URL+'/api/riester/upload',{method:'POST',body:fd})
    .then(function(r){return r.ok?r.json():r.json().then(function(e){throw e;});})
    .then(function(data){
      zone.style.opacity='';zone.style.pointerEvents='';
      statusEl.className='ok';
      statusEl.textContent=data.status==='needs_ocr'
        ?'✓ Datei empfangen. Gescanntes Dokument – wir verarbeiten es manuell und melden uns per E-Mail.'
        :'✓ Datei hochgeladen und wird analysiert. Das Ergebnis erhalten Sie per E-Mail.';
    })
    .catch(function(err){
      zone.style.opacity='';zone.style.pointerEvents='';
      statusEl.className='err';
      statusEl.textContent='Fehler beim Upload: '+((err&&err.detail)||'Bitte erneut versuchen.');
    });
  };
})();
</script>
<script>function scrollToUpload(){var u=document.getElementById('file-input')||document.querySelector('.uz-hint');if(u){u.scrollIntoView({behavior:'smooth',block:'center'});}}</script>
</body>
</html>
