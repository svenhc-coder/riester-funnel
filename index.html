<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef } = React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_URL = 'https://api.versicherungs-fuchs.online';
const BOOKING_URL = 'https://calendly.com/versicherungsfuchs/zweitmeinung'; // '' = disabled
const APP_LOGIN_URL = 'https://login.myinsure.de/start/?inviteKey=CBnRgQcT';

// ─── N8N EVENT BUS ────────────────────────────────────────────────────────────
const emitEvent = async (eventType, payload) => {
  const event = {
    event: eventType,
    source: 'riester_check_frontend',
    domain: 'versicherungs-fuchs.online',
    timestamp: new Date().toISOString(),
    payload,
  };
  // Push to n8n (non-blocking)
  fetch(`${API_URL}/api/events`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(event),
  }).catch(() => {}); // Silent fail
  // Local debug
  console.debug('[RIESTER EVENT]', event);
};

// ─── FRAGEN (12 Fragen) ───────────────────────────────────────────────────────
const QUESTIONS = [
  {
    id:'vertragstyp', question:'Um welche Art von Riester-Vertrag handelt es sich?',
    hint:'Steht meist auf dem Deckblatt der Police oder der Standmitteilung.',
    options:[
      {label:'Klassische Rentenversicherung (mit Garantiezins)',value:'klassisch'},
      {label:'Fondsgebundene Rentenversicherung',value:'fondsgebunden'},
      {label:'Banksparplan oder Bausparvertrag',value:'banksparplan'},
      {label:'Wohn-Riester (Eigenheimrente)',value:'wohn_riester'},
      {label:'Weiß ich nicht',value:'unbekannt'},
    ]
  },
  {
    id:'abschlussjahr', question:'In welchem Zeitraum wurde der Vertrag abgeschlossen?',
    hint:'Das Abschlussjahr steht auf der Police oder im Eröffnungsschreiben des Anbieters.',
    options:[
      {label:'Vor 2005',value:'vor2005'},
      {label:'2005 – 2012',value:'2005_2012'},
      {label:'2013 – 2017',value:'2013_2017'},
      {label:'Ab 2018',value:'ab2018'},
      {label:'Weiß ich nicht',value:'unbekannt'},
    ]
  },
  {
    id:'vertrag_status', question:'Wie ist Ihr Vertrag aktuell aufgestellt?',
    hint:'',
    options:[
      {label:'Aktiv – ich zahle regelmäßig',value:'aktiv'},
      {label:'Beitragsfrei gestellt',value:'beitragsfrei'},
      {label:'Pausiert / vorübergehend ausgesetzt',value:'pausiert'},
      {label:'Gekündigt / aufgelöst',value:'gekuendigt'},
      {label:'Weiß ich nicht',value:'unbekannt'},
    ]
  },
  {
    id:'beitrag', question:'Wie hoch ist Ihr monatlicher Beitrag (inkl. Zulage)?',
    hint:'Der Gesamtbetrag, der monatlich vom Konto abgebucht wird – inkl. staatlicher Zulage.',
    options:[
      {label:'Unter 50 €',value:'unter50'},
      {label:'50 – 100 €',value:'50_100'},
      {label:'100 – 200 €',value:'100_200'},
      {label:'Über 200 €',value:'ueber200'},
      {label:'Weiß ich nicht',value:'unbekannt'},
    ]
  },
  {
    id:'kinder', question:'Wie viele kindergeldberechtigte Kinder haben Sie?',
    hint:'Jedes Kind kann eine Kinderzulage begründen – sofern diese auch beantragt wird.',
    options:[
      {label:'Keine Kinder',value:'0'},
      {label:'1 Kind',value:'1'},
      {label:'2 Kinder',value:'2'},
      {label:'3 oder mehr Kinder',value:'3plus'},
    ]
  },
  {
    id:'zulagen', question:'Wie werden Ihre Zulagen (Grund- + Kinderzulage) beantragt?',
    hint:'Zulagen müssen aktiv beantragt werden – viele Anbieter übernehmen das automatisch.',
    options:[
      {label:'Automatisch – mein Anbieter beantragt jährlich',value:'automatisch'},
      {label:'Ich muss es selbst beantragen',value:'selbst'},
      {label:'Weiß ich nicht',value:'unbekannt'},
    ]
  },
  {
    id:'anlage_av', question:'Tragen Sie den Riester-Vertrag in der Steuererklärung ein (Anlage AV)?',
    hint:'Damit können Sie bis zu 2.100 € jährlich als Sonderausgaben geltend machen.',
    options:[
      {label:'Ja, jährlich',value:'jaehrlich'},
      {label:'Manchmal / unregelmäßig',value:'manchmal'},
      {label:'Nein',value:'nie'},
      {label:'Weiß ich nicht',value:'unbekannt'},
    ]
  },
  {
    id:'einkommen', question:'Wie hoch ist Ihr ungefähres Jahreseinkommen (brutto)?',
    hint:'Hilft einzuschätzen, wie groß der steuerliche Vorteil durch die Anlage AV sein kann.',
    options:[
      {label:'Unter 25.000 €',value:'unter25k'},
      {label:'25.000 – 50.000 €',value:'25_50k'},
      {label:'50.000 – 90.000 €',value:'50_90k'},
      {label:'Über 90.000 €',value:'ueber90k'},
      {label:'Selbstständig / variabel',value:'selbststaendig'},
    ]
  },
  {
    id:'beschaeftigung', question:'Was beschreibt Ihre aktuelle Beschäftigungssituation am besten?',
    hint:'Entscheidet über die grundsätzliche Förderberechtigung für Riester-Produkte.',
    options:[
      {label:'Angestellt (sozialversicherungspflichtig)',value:'angestellt'},
      {label:'Verbeamtet',value:'beamter'},
      {label:'Selbstständig',value:'selbststaendig'},
      {label:'In Elternzeit',value:'elternzeit'},
      {label:'Derzeit nicht beschäftigt / arbeitslos',value:'nicht'},
    ]
  },
  {
    id:'transparenz', question:'Wie gut kennen Sie die Kosten und Konditionen Ihres Vertrags?',
    hint:'Effektivkosten (z. B. in %) stehen in der Regel auf Ihrer jährlichen Standmitteilung.',
    options:[
      {label:'Klar – ich kenne Kosten und Konditionen',value:'klar'},
      {label:'Eher unklar',value:'unklar'},
      {label:'Wirkt hoch / fühlt sich teuer an',value:'hoch'},
      {label:'Weiß ich nicht',value:'unbekannt'},
    ]
  },
  {
    id:'risikoprofil', question:'Was ist Ihnen bei der Altersvorsorge am wichtigsten?',
    hint:'Keine richtige oder falsche Antwort – es geht um Ihre persönliche Präferenz.',
    options:[
      {label:'Sicherheit – möglichst keine Verluste',value:'sicherheit'},
      {label:'Balance – Rendite und Absicherung',value:'balance'},
      {label:'Rendite – maximales Wachstum',value:'rendite'},
    ]
  },
  {
    id:'zielbild', question:'Was möchten Sie mit Ihrer Altersvorsorge als nächstes tun?',
    hint:'Ab 2027 gibt es das neue staatlich geförderte Altersvorsorgedepot (ETF-basiert) als Alternative zu Riester.',
    options:[
      {label:'Vertrag behalten und ggf. optimieren',value:'behalten'},
      {label:'Wechsel ins Altersvorsorgedepot ab 2027 prüfen',value:'wechsel_pruefen'},
      {label:'Erst prüfen lassen, dann entscheiden',value:'erst_pruefen'},
      {label:'Weiß ich noch nicht',value:'unbekannt'},
    ]
  },
];

// ─── SCORING (3 Scores + Ampel) ───────────────────────────────────────────────
function berechneScores(a) {
  // S1: Förder-/Zulagen-Risiko (0–100, hoch = schlecht) · Q5–Q9
  let s1 = 0;
  if (a.zulagen === 'unbekannt') s1 += 35;
  else if (a.zulagen === 'selbst') s1 += 22;
  if (a.anlage_av === 'nie') s1 += 28;
  else if (a.anlage_av === 'manchmal') s1 += 14;
  else if (a.anlage_av === 'unbekannt') s1 += 20;
  if (['2','3plus'].includes(a.kinder) && a.zulagen !== 'automatisch') s1 += 15;
  if (['selbststaendig','nicht'].includes(a.beschaeftigung)) s1 += 12;
  if (a.einkommen === 'selbststaendig') s1 += 8;
  s1 = Math.min(100, s1);

  // S2: Vertrags-/Kosten-Risiko (0–100, hoch = schlecht) · Q1–Q4 + Q10
  let s2 = 0;
  if (a.vertragstyp === 'unbekannt') s2 += 18;
  if (['2013_2017','ab2018'].includes(a.abschlussjahr)) s2 += 22;
  else if (a.abschlussjahr === 'unbekannt') s2 += 12;
  if (a.vertrag_status === 'beitragsfrei') s2 += 15;
  else if (a.vertrag_status === 'pausiert') s2 += 22;
  else if (a.vertrag_status === 'gekuendigt') s2 += 30;
  else if (a.vertrag_status === 'unbekannt') s2 += 8;
  if (a.beitrag === 'unter50') s2 += 12;
  else if (a.beitrag === 'unbekannt') s2 += 8;
  if (a.transparenz === 'hoch') s2 += 28;
  else if (a.transparenz === 'unklar') s2 += 16;
  else if (a.transparenz === 'unbekannt') s2 += 10;
  s2 = Math.min(100, s2);

  // S3: Depot-Wechsel-Eignung ab 2027 (0–100, hoch = gut) · Q11–Q12
  let s3 = 25;
  if (a.risikoprofil === 'rendite') s3 += 30;
  else if (a.risikoprofil === 'balance') s3 += 15;
  if (a.zielbild === 'wechsel_pruefen') s3 += 30;
  else if (a.zielbild === 'erst_pruefen') s3 += 12;
  if (['2013_2017','ab2018'].includes(a.abschlussjahr) && ['hoch','unklar'].includes(a.transparenz)) s3 += 12;
  if (a.risikoprofil !== 'sicherheit') s3 += 8;
  s3 = Math.min(100, s3);

  return { s1, s2, s3 };
}

function berechneAmpel(a) {
  const { s1, s2 } = berechneScores(a);
  if (s1 >= 60 || s2 >= 60) return 'red';
  if (s1 >= 30 || s2 >= 30) return 'yellow';
  return 'green';
}

// Orientierungswert für PreLeadGate (0–100, hoch = gut)
function berechneScore(a) {
  const { s1, s2 } = berechneScores(a);
  return Math.round(100 - (s1 * 0.5 + s2 * 0.5));
}

// ─── HANDLUNGSEMPFEHLUNG (Hinweise, keine Gewissheiten) ──────────────────────
function getHandlungsempfehlung(a, ampel) {
  const { s1, s2, s3 } = berechneScores(a);

  if (a.vertrag_status === 'gekuendigt') return {
    action:'bereits_beendet', icon:'ℹ️',
    titel:'Vertrag scheint nicht mehr aktiv zu sein',
    kurzinterpretation:'Auf Basis Ihrer Angaben scheint der Vertrag nicht mehr aktiv zu sein. Ob noch Handlungsbedarf besteht, lässt sich erst mit den Unterlagen klären.',
    was_bedeutet_das:'Es könnten noch nicht abgerufene Restwerte oder offene Fragen bestehen. Belastbare Aussagen sind nur mit dem tatsächlichen Vertragsdokument möglich. Auch ein beendeter Vertrag sollte formal korrekt dokumentiert sein.',
    naechste_schritte:['Letzte Standmitteilung oder Bestätigung beim Anbieter anfordern','Prüfen, ob Restwerte noch vorhanden sind','Im Deep-Check klären, ob weitere Schritte sinnvoll sind'],
  };

  if (s1 >= 55) return {
    action:'foerder_risiko', icon:'⚠️',
    titel:'Hinweise auf möglicherweise ungenutzte Förderung',
    kurzinterpretation:'Ihre Antworten deuten darauf hin, dass staatliche Förderungen möglicherweise nicht vollständig abgerufen werden. Das ist ein häufiges Muster und lässt sich oft verbessern – ob das bei Ihnen zutrifft, zeigen erst Ihre Unterlagen.',
    was_bedeutet_das:'Zulagen müssen aktiv beantragt werden und können teils rückwirkend nachgeholt werden. Wie groß eine mögliche Lücke ist, zeigt erst eine Prüfung der tatsächlichen Zulagenhistorie. Bestehende Verträge haben Bestandsschutz – es gibt keinen Grund für hektische Schritte.',
    naechste_schritte:['Zulagen-Status schriftlich beim Anbieter anfragen','Anlage AV bei der nächsten Steuererklärung sorgfältig ausfüllen','Im Deep-Check prüfen, ob Optimierungspotenzial besteht'],
  };

  if (s2 >= 55) return {
    action:'kosten_risiko', icon:'🔍',
    titel:'Hinweise auf mögliche Kosten- oder Strukturthemen',
    kurzinterpretation:'Einige Ihrer Angaben – insbesondere zu Kosten und Vertragsstatus – deuten auf mögliche Stellschrauben hin. Das muss nicht negativ sein, sollte aber geprüft werden.',
    was_bedeutet_das:'Ob und wie stark Kosten die Entwicklung Ihres Vertrags beeinflussen, lässt sich erst mit den tatsächlichen Vertragsdaten beurteilen. Effektivkostenquoten stehen in der Regel auf der Standmitteilung. Altverträge können Besonderheiten haben, die erhalten werden sollten.',
    naechste_schritte:['Aktuelle Standmitteilung heraussuchen','Effektivkostenquote und Vertragsstruktur darin identifizieren','Im Deep-Check Kosten- und Strukturanalyse durchführen lassen'],
  };

  if (s3 >= 65 && ampel !== 'green') return {
    action:'depot_pruefen', icon:'🔄',
    titel:'Altersvorsorgedepot ab 2027 als Option prüfen',
    kurzinterpretation:'Basierend auf Ihren Angaben spricht einiges dafür, die neue Depotoption ab 2027 in die Überlegungen einzubeziehen. Das bedeutet nicht, dass der bestehende Vertrag schlechter ist – ein datenbasierter Vergleich ist der richtige Schritt.',
    was_bedeutet_das:'Ob ein Wechsel oder eine Parallelführung sinnvoll ist, hängt von Ihrem Vertrag im Detail ab – Garantien, verbleibende Laufzeit und Wechselkosten spielen eine Rolle. Ein Wechsel ist ab 2027 freiwillig möglich; Bestandsschutz für bestehende Verträge bleibt bestehen.',
    naechste_schritte:['Standmitteilung und Garantiewerte des bestehenden Vertrags heraussuchen','Depot-Option 2027 als Ergänzung oder Alternative im Blick behalten','Im Strategischen Deep-Check beide Szenarien evidenzbasiert gegenüberstellen'],
  };

  if (ampel === 'green') return {
    action:'solide', icon:'✅',
    titel:'Keine offensichtlichen Warnsignale erkennbar',
    kurzinterpretation:'Auf Basis Ihrer Antworten ergeben sich keine direkten Hinweise auf dringenden Handlungsbedarf. Das ist eine gute Ausgangslage – aber kein abschließendes Urteil.',
    was_bedeutet_das:'Auch bei einem unauffälligen Quick-Check können im Detail Optimierungspotenziale stecken – etwa bei Kostentransparenz, Zulagenhistorie oder der neuen Depotoption ab 2027. Bestehende Verträge haben Bestandsschutz; es gibt keinen Grund für hektische Schritte.',
    naechste_schritte:['Nächste Standmitteilung sorgfältig lesen','Zulagenquittung beim Anbieter anfordern','Optional: Depot-Option ab 2027 als mögliche Ergänzung klären lassen'],
  };

  return {
    action:'optimieren', icon:'🔧',
    titel:'Prüfung empfohlen – mögliche Stellschrauben erkennbar',
    kurzinterpretation:'Einige Ihrer Antworten deuten auf Felder hin, die sich lohnen könnten zu überprüfen. Ohne Vertragsdaten lässt sich das nicht präziser eingrenzen.',
    was_bedeutet_das:'Ob und in welchem Umfang Verbesserungen möglich sind, hängt von Ihrem konkreten Vertrag ab. Der Quick-Check gibt eine Orientierung – mehr nicht. Belastbar entscheiden lässt sich erst mit Ihrer Standmitteilung. Bestehende Verträge haben Bestandsschutz – keine Hektik.',
    naechste_schritte:['Aktuelle Standmitteilung oder Vertragsunterlagen heraussuchen','Zulagen- und Beitragsstatus beim Anbieter klären','Im Deep-Check alle relevanten Details analysieren lassen'],
  };
}

// ─── SVG ICONS ────────────────────────────────────────────────────────────────
const Ic = {
  Arrow: ()=>React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},React.createElement('line',{x1:5,y1:12,x2:19,y2:12}),React.createElement('polyline',{points:'12 5 19 12 12 19'})),

function SchnellCheck({onComplete,onBack}) {
  const [idx,setIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [selected,setSelected]=useState(null);
  const [fade,setFade]=useState(false);
  const q=QUESTIONS[idx];
  const pct=Math.round((idx/QUESTIONS.length)*100);

  const next=()=>{
    if(!selected) return;
    const na={...answers,[q.id]:selected};
    setAnswers(na);
    if(idx<QUESTIONS.length-1){
      setFade(true);
      setTimeout(()=>{setIdx(idx+1);setSelected(null);setFade(false);},180);
    } else {
      emitEvent('check_completed',{answers:na,ampel:berechneAmpel(na),score:berechneScore(na)});
      onComplete(na);
    }
  };

  const back=()=>{
    if(idx===0){onBack();return;}
    const prev={...answers}; delete prev[q.id];
    setAnswers(prev); setIdx(idx-1); setSelected(answers[QUESTIONS[idx-1].id]||null);
  };

  return React.createElement('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'80px 24px 40px'}},
    React.createElement('div',{style:{width:'100%',maxWidth:580}},
      // Header
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28}},
        React.createElement('button',{onClick:back,style:{background:'none',border:'none',color:'rgba(240,237,232,0.45)',cursor:'pointer',fontSize:14}},'← Zurück'),
        React.createElement('span',{style:{color:'rgba(240,237,232,0.35)',fontSize:13}},`${idx+1} / ${QUESTIONS.length}`)
      ),
      // Progress
      React.createElement('div',{className:'progress-bar',style:{marginBottom:8}},
        React.createElement('div',{className:'progress-fill',style:{width:`${pct}%`}})
      ),
      React.createElement('div',{style:{color:'rgba(240,237,232,0.3)',fontSize:12,marginBottom:36,textAlign:'right'}},`${pct} % abgeschlossen`),
      // Question
      React.createElement('div',{style:{opacity:fade?0:1,transition:'opacity 0.18s'},className:'fade-up'},
        React.createElement('h2',{style:{fontSize:'clamp(19px,3vw,26px)',fontWeight:700,marginBottom:8,lineHeight:1.3}},q.question),
        q.hint&&React.createElement('p',{style:{color:'rgba(240,237,232,0.4)',fontSize:13,marginBottom:24}},q.hint),
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10,marginBottom:32}},
          q.options.map(opt=>
            React.createElement('button',{key:opt.value,className:`answer-card${selected===opt.value?' selected':''}`,onClick:()=>setSelected(opt.value)},
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
                React.createElement('span',null,opt.label),
                selected===opt.value&&React.createElement('span',{style:{color:'#c25700'}},React.createElement(Ic.Check))
              )
            )
          )
        ),
        React.createElement('button',{className:'btn-primary',style:{width:'100%',justifyContent:'center',fontSize:16,opacity:selected?1:0.4,cursor:selected?'pointer':'not-allowed'},onClick:next,disabled:!selected},
          idx<QUESTIONS.length-1?'Weiter':'Ergebnis anzeigen',React.createElement(Ic.Arrow)
        )
      ),
      // Dots
      React.createElement('div',{style:{display:'flex',justifyContent:'center',gap:6,marginTop:28}},
        QUESTIONS.map((_,i)=>
          React.createElement('div',{key:i,style:{width:6,height:6,borderRadius:'50%',background:i<=idx?'#c25700':'rgba(255,255,255,0.15)',transition:'all 0.2s'}})
        )
      )
    )
  );
}
